metadata:
  fixture_version: 1.0.0
  purpose: Independently transcribed HCM 7.0 Chapter 27 freeway-weaving operational examples
  status: validation_fixture
  method_version: hcm_7_0
  source_reference: HCM 7th.pdf, Chapter 27, printed pp. 27-2 through 27-16
  note: No copyrighted narrative or source images are included. Values are native US customary units.
