<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">HCM 7.0 one-lane right-side freeway merge segment</title>
  <desc id="desc">Conceptual diagram of a right-side on-ramp entering a freeway, showing upstream freeway flow, ramp flow, acceleration lane LA, merge point, influence area, downstream combined flow, and directional lane count.</desc>
  <rect width="960" height="320" fill="#f8fafc"/>
  <rect x="60" y="72" width="830" height="92" fill="#d7dde5" stroke="#64748b" stroke-width="2"/>
  <line x1="60" y1="118" x2="890" y2="118" stroke="#ffffff" stroke-width="4" stroke-dasharray="28 18"/>
  <path d="M505 226 C575 207 610 174 660 164 L830 164 L830 214 L610 214 C555 214 510 250 440 276" fill="#d7dde5" stroke="#64748b" stroke-width="2"/>
  <path d="M625 164 L770 164" stroke="#0f766e" stroke-width="8"/>
  <path d="M642 52 H820" stroke="#2563eb" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M392 280 C475 252 545 204 620 176" stroke="#dc2626" stroke-width="5" fill="none" marker-end="url(#arrowRed)"/>
  <path d="M760 52 H900" stroke="#2563eb" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <rect x="590" y="56" width="160" height="145" fill="#fde68a" opacity="0.35" stroke="#b45309" stroke-width="2" stroke-dasharray="8 7"/>
  <circle cx="620" cy="164" r="7" fill="#111827"/>
  <text x="68" y="46" font-family="Arial, sans-serif" font-size="22" fill="#111827">Merge Segment / ช่วงทางรวม</text>
  <text x="70" y="97" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">Upstream freeway demand vF</text>
  <text x="705" y="95" font-family="Arial, sans-serif" font-size="17" fill="#1f2937">Downstream combined flow vFO</text>
  <text x="388" y="296" font-family="Arial, sans-serif" font-size="17" fill="#991b1b">On-ramp demand vR</text>
  <text x="612" y="188" font-family="Arial, sans-serif" font-size="16" fill="#111827">Merge point</text>
  <text x="650" y="157" font-family="Arial, sans-serif" font-size="17" fill="#0f766e">LA acceleration lane</text>
  <text x="600" y="222" font-family="Arial, sans-serif" font-size="16" fill="#92400e">Influence area</text>
  <text x="70" y="190" font-family="Arial, sans-serif" font-size="16" fill="#334155">Directional freeway lanes: N</text>
  <text x="70" y="220" font-family="Arial, sans-serif" font-size="14" fill="#475569">Conceptual, not to scale. Inputs come from worksheet fields, not this image.</text>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
